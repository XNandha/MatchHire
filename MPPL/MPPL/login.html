<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — MatchHire</title>
<link rel="stylesheet" href="assets/css/global.css">
<link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
  <main class="auth-page">
    <div class="auth-brand">
      <img src="assets/images/logo_matchhire.png" alt="MatchHire"/>
    </div>
    <div class="auth-card">
      <div class="auth-card__top">
        <button class="link link-back" type="button" onclick="history.back()"><span class="icon icon-back" aria-hidden="true"></span>Kembali</button>
        <a class="link" href="#"><span class="icon icon-help" aria-hidden="true"></span>Bantuan</a>
      </div>
      <h1 class="auth-title">Login</h1>
      <p class="auth-subtitle">Temukan kerjaan yang sesuai  denganmu disini.</p>

      <form id="loginForm" class="auth-form">
        <label class="field">
          <span class="field__label">Masukan alamat Email</span>
          <input class="input" type="email" id="email" placeholder="Contoh: email@matchhire.com" required>
        </label>
        <button type="submit" class="btn-solid btn-full">Lanjutkan</button>
      </form>

      <div class="divider"></div>
      <div class="divider-text">atau masuk dengan</div>

      <button class="btn-alt btn-full" type="button">
        <span class="icon icon-google" aria-hidden="true"></span>
        Masuk dengan Google
      </button>
      <button class="btn-alt btn-full" type="button">
        <span class="icon icon-facebook" aria-hidden="true"></span>
        Masuk dengan Facebook
      </button>

      <div class="hr-note">
        <span>Apakah Anda HR?</span>
        <a href="employer/post-job.html" class="link">Buka Lowongan di MatchHire.com</a>
      </div>
    </div>
  </main>
  <script src="assets/js/auth.js"></script>
</body>
</html>
