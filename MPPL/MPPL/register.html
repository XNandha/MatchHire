<!doctype html>
<html lang="en">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Register — MatchHire</title><link rel="stylesheet" href="assets/css/global.css"></head>
<body>
  <div class="container auth">
    <h2>Register</h2>
    <form id="registerForm">
      <label>Full name<input type="text" id="name" required></label>
      <label>Email<input type="email" id="email"></label>
      <label>Password<input type="password" id="password"></label>
      <label>Role
        <select id="role">
          <option value="jobseeker">Job Seeker</option>
          <option value="employer">Employer</option>
        </select>
      </label>
      <button type="submit" class="btn">Create account</button>
    </form>
    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>
  <script src="assets/js/auth.js"></script>
</body>
</html>
