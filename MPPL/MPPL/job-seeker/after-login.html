<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Setelah Login — MatchHire</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/after-login.css">
</head>
<body>
  <main class="onboard-page">
    <!-- Logo MatchHire -->
    <div class="logo">
      <img src="/assets/images/logo_matchhire.png" alt="MatchHire Logo">
    </div>

    <!-- Kartu utama -->
    <div class="onboard-card">
      <div class="onboard-card__top">
        <button class="link" type="button" onclick="history.back()">← Kembali</button>
        <a class="link" href="#">Bantuan</a>
      </div>

      <div class="onboard-art">
        <img src="../assets/images/hero_keeping_in_touch.png" alt="Ilustrasi">
      </div>

      <h1 class="onboard-title">Rekomendasi Pekerjaan Sesuai Profil Anda</h1>
      <p class="onboard-desc">
        Isi pengalaman, pendidikan, dan skill terakhir Anda, untuk dapatkan presentase kecocokan dan rekomendasi sesuai profil Anda.
      </p>

      <h2 class="onboard-question">Punya Pengalaman?</h2>

      <div class="onboard-choices">
        <a href="profile.html" class="choice no-box">
          <img src="../assets/images/icon_experience.png" alt="Ikon pengalaman"> 
          Berpengalaman
        </a>
        <a href="profile.html" class="choice no-box">
          <img src="../assets/images/icon_graduate.png" alt="Ikon fresh graduate"> 
          Fresh Graduate
        </a>
      </div>

      <button class="btn-outline" type="button" onclick="location.href='dashboard.html'">Lewati</button>
    </div>
  </main>
</body>
</html>
